site_name: Vita's Python Book
site_description: 从零开始，八天入门 Python

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: LXGW WenKai
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 2

nav:
  - 首页: index.md
  - Day 1 安装环境，写第一行代码: day1.md
  - Day 2 变量与计算：AA制费用: day2.md
  - Day 3 条件判断：小测验游戏: day3.md
  - Day 4 循环：批量处理数据: day4.md
  - Day 5 列表与字典：旅行清单: day5.md
  - Day 6 函数：封装重复逻辑: day6.md
  - Day 7 对象：理解万物皆对象: day7.md
  - Day 8 实战：数据分析小工具: day8.md
